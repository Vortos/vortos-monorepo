name: Monorepo Split

on:
  push:
    branches:
      - main
    tags:
      - '*'

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: redis
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --ignore-platform-reqs

      - name: Run tests
        run: ./vendor/bin/phpunit packages/Vortos/Tests/ --testdox

  split:
    needs: tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - local_path: 'packages/Vortos/src/Domain'
            split_repository: 'vortos-domain'
          - local_path: 'packages/Vortos/src/Foundation'
            split_repository: 'vortos-foundation'
          - local_path: 'packages/Vortos/src/Http'
            split_repository: 'vortos-http'
          - local_path: 'packages/Vortos/src/Logger'
            split_repository: 'vortos-logger'
          - local_path: 'packages/Vortos/src/Cache'
            split_repository: 'vortos-cache'
          - local_path: 'packages/Vortos/src/Tracing'
            split_repository: 'vortos-tracing'
          - local_path: 'packages/Vortos/src/Persistence'
            split_repository: 'vortos-persistence'
          - local_path: 'packages/Vortos/src/PersistenceDbal'
            split_repository: 'vortos-persistence-dbal'
          - local_path: 'packages/Vortos/src/PersistenceMongo'
            split_repository: 'vortos-persistence-mongo'
          - local_path: 'packages/Vortos/src/Messaging'
            split_repository: 'vortos-messaging'
          - local_path: 'packages/Vortos/src/Cqrs'
            split_repository: 'vortos-cqrs'
          - local_path: 'packages/Vortos/src/Auth'
            split_repository: 'vortos-auth'
          - local_path: 'packages/Vortos/src/Authorization'
            split_repository: 'vortos-authorization'
          - local_path: 'packages/Vortos/src/Docker'
            split_repository: 'vortos-docker'
          - local_path: 'packages/Vortos'
            split_repository: 'vortos-framework'
          - local_path: 'packages/Vortos/src/Migration'
            split_repository: 'vortos-migration'
          - local_path: 'packages/Vortos/src/Make'
            split_repository: 'vortos-make'
          - local_path: 'packages/Vortos/src/Debug'
            split_repository: 'vortos-debug'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: danharrin/monorepo-split-github-action@v2.4.4
        env:
          GITHUB_TOKEN: ${{ secrets.MONOREPO_SPLIT_TOKEN }}
        with:
          package_directory: ${{ matrix.package.local_path }}
          repository_organization: 'Vortos'
          repository_name: ${{ matrix.package.split_repository }}
          user_name: 'vortos-bot'
          user_email: 'bot@vortos.dev'
          tag: ${{ github.ref_type == 'tag' && github.ref_name || '' }}